experiment:
  name: scope_s3
  seed: 42
  output_directory: outputs/scope_s3

model:
  name: SCOPE
  scale: s3
  input_resolution: 896
  width_multiplier: 1.20
  depth_multiplier: 1.40
  bifpn_channels: 160
  head_depth: 4
  anchors_per_location: 9
  number_of_bifpn_layers: 1
  backbone_attention: CBAM
  fusion_attention: SqueezeExcitation

dataset:
  name: udacity
  train_images: /path/to/dataset/train/images
  train_annotations: /path/to/dataset/train/annotations.json
  val_images: /path/to/dataset/val/images
  val_annotations: /path/to/dataset/val/annotations.json
  number_of_classes: null

training:
  epochs: 120
  batch_size: 8
  workers: 4
  optimizer: SGD
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.00004
  nesterov: true
  amp: true
  gradient_clip_norm: 10.0
  save_every: 10
  resume: null

scheduler:
  name: MultiStepLR
  milestones: [50, 90]
  gamma: 0.1

loss:
  classification: FocalLoss
  focal_alpha: 0.25
  focal_gamma: 2.0
  regression: SmoothL1Loss
  smooth_l1_beta: 0.1111111111
  box_loss_weight: 1.0

evaluation:
  score_threshold: 0.001
  nms_threshold: 0.5
  max_detections: 300
  metrics: [mAP, mAP_50, mAP_75]

efficiency:
  measure_flops: true
  measure_parameters: true
  measure_inference_latency: true
  latency_warmup_iterations: 20
  latency_measured_iterations: 100
